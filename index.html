<html lang="ja">
<head>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#020203;--white:rgba(255,255,255,.96);--text:rgba(255,255,255,.78);
      --mint:#39c5bb;--mint2:#86cecb;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;overflow-x:hidden;
      background:
        radial-gradient(circle at 50% 0%,rgba(57,197,187,.11),transparent 30%),
        radial-gradient(circle at 10% 20%,rgba(134,206,203,.08),transparent 22%),
        linear-gradient(180deg,#080b0f 0%,#020203 52%,#010102 100%);
      color:var(--text);font-family:'EB Garamond','Noto Serif JP',serif
    }
    body{position:relative;overflow-y:auto;min-height:100vh}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;
      background-image:linear-gradient(120deg,transparent 0 49.6%,rgba(255,255,255,.02) 49.7% 50.3%,transparent 50.4% 100%);z-index:0}
    .noise{position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:radial-gradient(rgba(255,255,255,.06) .55px,transparent .55px);
      background-size:18px 18px;opacity:.11;mix-blend-mode:screen}

    /* ── Intro ── */
    .intro-screen{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:#000;transition:opacity .7s ease,visibility .7s ease}
    .intro-screen.hide{opacity:0;visibility:hidden}
    .intro-text{color:#fff;font-family:'Noto Serif JP',serif;font-size:clamp(22px,4vw,44px);letter-spacing:.12em;text-align:center;padding:0 20px;line-height:1.6}
    .cursor{display:inline-block;animation:blink .3s step-end 4}
    @keyframes blink{50%{opacity:0}}

    /* ── Layout ── */
    .wrap{position:relative;z-index:2;min-height:100vh;padding:32px 18px 44px;display:flex;align-items:center;justify-content:center}
    .main{width:min(100%,1120px);display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s ease}
    .main.ready{opacity:1;transform:translateY(0)}

    /* ── Logo ── */
    .logo{
      font-family:'EB Garamond',serif;
      font-size:clamp(56px,10vw,108px);
      font-weight:600;letter-spacing:.24em;padding-left:.24em;
      color:#fff;
      text-shadow:0 0 18px rgba(57,197,187,.18),0 0 42px rgba(57,197,187,.09);
      line-height:1.15;
    }
    .logo-i{position:relative;display:inline-block}
    .logo-i-char{display:inline-block;transition:opacity .35s ease}
    .logo-i-heart{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-52%);
      font-size:.6em;
      color:var(--mint);
      text-shadow:0 0 8px rgba(57,197,187,1),0 0 22px rgba(57,197,187,.9),0 0 44px rgba(57,197,187,.6),0 0 80px rgba(57,197,187,.3);
      opacity:0;transition:opacity .35s ease;
      pointer-events:none;white-space:nowrap;letter-spacing:0;
    }
    .logo-i.is-heart .logo-i-char{opacity:0}
    .logo-i.is-heart .logo-i-heart{opacity:1}

    .tagline{font-family:'Noto Serif JP',serif;font-size:clamp(18px,2vw,26px);line-height:1.9;color:var(--white);letter-spacing:.08em;max-width:760px}
    .sub{font-family:'Noto Serif JP',serif;font-size:clamp(14px,1.7vw,17px);line-height:2.1;letter-spacing:.06em;color:rgba(255,255,255,.74);max-width:760px}

    /* ── Cards ── */
    .links{width:min(100%,980px);display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:10px}

    .link-card{
      display:flex;flex-direction:column;justify-content:space-between;
      padding:22px;min-height:160px;
      text-decoration:none;position:relative;overflow:hidden;
      text-align:left;
      clip-path:polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 0 100%);
      border-left:3px solid var(--mint);
      border-top:1px solid rgba(57,197,187,.2);
      border-right:1px solid rgba(57,197,187,.12);
      border-bottom:1px solid rgba(57,197,187,.12);
      background:linear-gradient(145deg,#0c1f1e 0%,#040d0c 100%);
      box-shadow:
        0 0 12px rgba(57,197,187,.18),
        0 0 28px rgba(57,197,187,.07),
        inset 4px 0 14px rgba(57,197,187,.05),
        inset 0 0 24px rgba(57,197,187,.03);
      transition:transform .22s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .link-card::before{
      content:'';position:absolute;left:0;right:0;top:0;
      height:2px;
      background:linear-gradient(90deg,transparent,rgba(57,197,187,.72),transparent);
      animation:card-scan 4.5s linear infinite;
      pointer-events:none;
    }
    @keyframes card-scan{
      0%  {top:0;  opacity:0}
      4%  {opacity:1}
      92% {opacity:.75}
      100%{top:100%;opacity:0}
    }
    .link-card::after{
      content:'';position:absolute;top:0;right:0;
      width:26px;height:26px;
      background:var(--mint);
      clip-path:polygon(100% 0,100% 100%,0 0);
      opacity:.82;transition:opacity .22s ease;
      pointer-events:none;
    }
    .link-card:hover{
      transform:translateY(-4px);
      border-left-color:rgba(57,197,187,.95);
      border-color:rgba(57,197,187,.4);
      box-shadow:
        -6px 0 28px rgba(57,197,187,.3),
        0 0 40px rgba(57,197,187,.14),
        0 0 70px rgba(57,197,187,.07),
        inset 0 0 30px rgba(57,197,187,.07);
    }
    .link-card:hover::after{opacity:1}

    .link-comment{
      font-family:'Noto Serif JP',serif;
      font-size:clamp(15px,1.7vw,19px);
      line-height:1.9;
      color:rgba(210,255,252,.9);
      word-break:normal;
      overflow-wrap:break-word;
      flex:1;
    }
    .link-footer{
      display:flex;justify-content:space-between;align-items:center;
      margin-top:14px;
      font-family:'Noto Serif JP',serif;
      font-size:11px;letter-spacing:.16em;
      color:rgba(57,197,187,.52);
    }

    /* ── Share ── */
    .share{width:min(100%,760px);display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:6px}
    .share-label{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:.28em;color:rgba(255,255,255,.42)}
    .share-row{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
    .share-btn{
      appearance:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);
      color:var(--white);font-family:'Noto Serif JP',serif;font-size:12px;letter-spacing:.12em;
      text-decoration:none;padding:12px 16px;border-radius:999px;
      transition:all .22s ease;cursor:pointer;
    }
    .share-btn:hover{background:rgba(57,197,187,.96);color:#000;border-color:rgba(57,197,187,.96)}

    .footer-note{width:min(100%,760px);font-family:'Noto Serif JP',serif;font-size:11px;line-height:1.9;letter-spacing:.1em;color:rgba(255,255,255,.32);text-align:center;padding-top:6px}

    /* ── Floating comments ── */
    .comments-layer{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
    .comment{position:absolute;white-space:nowrap;color:rgba(190,255,245,.72);font-family:'Noto Serif JP',serif;font-weight:300;letter-spacing:.04em;text-shadow:0 0 12px rgba(57,197,187,.22);animation:drift linear infinite;user-select:none;will-change:transform}
    @keyframes drift{from{transform:translateX(120vw)}to{transform:translateX(-140vw)}}

    /* ── Glows ── */
    .glow{position:fixed;width:340px;height:340px;border-radius:999px;filter:blur(42px);pointer-events:none;z-index:1;opacity:.55}
    .glow.one{top:8%;left:-70px;background:radial-gradient(circle,rgba(57,197,187,.18),transparent 70%);animation:pulse 10s ease-in-out infinite}
    .glow.two{right:-60px;bottom:10%;background:radial-gradient(circle,rgba(134,206,203,.12),transparent 70%);animation:pulse 12s ease-in-out infinite reverse}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.42}50%{transform:scale(1.14);opacity:.82}}

    @media(max-width:900px){.links{grid-template-columns:1fr}.link-card{min-height:auto}}
    @media(max-width:640px){
      .wrap{padding:22px 14px 28px}
      .logo{font-size:clamp(44px,16vw,76px)}
      .tagline{font-size:18px}
      .sub{line-height:2}
      .link-comment{font-size:15px}
      .link-card{padding:18px}
      .share-btn{flex:1 1 100%;text-align:center}
    }
  </style>
</head>

  const SEEN_KEY='mikulink_seen_v3';const MAX_SEEN=20;
  function getSeenIds(){try{return JSON.parse(localStorage.getItem(SEEN_KEY)||'[]')}catch{return[]}}
  function saveSeenIds(ids){try{localStorage.setItem(SEEN_KEY,JSON.stringify(ids))}catch{}}
  function pickThree(){
    const seen=getSeenIds();
    const available=POOL.filter(item=>!seen.includes(item.id));
    const source=available.length>=3?available:POOL;
    const arr=[...source];
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
    const picks=arr.slice(0,3);
    const updated=[...seen,...picks.map(p=>p.id)];
    saveSeenIds(updated.length>MAX_SEEN?updated.slice(updated.length-MAX_SEEN):updated);
    return picks;
  }

  const selected=pickThree();
  document.getElementById('links').innerHTML=selected.map(item=>`
    <a class="link-card" href="${item.url}" target="_blank" rel="noopener noreferrer">

      <div class="link-footer">
        <span>${item.title} / ${item.artist}</span>
        <span>▶ 開く</span>

    </a>
  `).join('');

  const shareText=encodeURIComponent('見つけて欲しいミクがいる。\nMIKULINKは、曲を聴いた誰かのコメントからミクに出会えるサービスです。');

  document.getElementById('share-x').href=`https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}`;

  document.getElementById('copy-share').addEventListener('click',async(e)=>{
    e.preventDefault();
    try{await navigator.clipboard.writeText(window.location.href);e.currentTarget.textContent='コピーしました';setTimeout(()=>e.currentTarget.textContent='URLをコピー',1600)}
    catch{alert('URLのコピーに失敗しました')}
  });

  const floatingComments=['今でも深夜に聴いてる','受験期の夜を思い出す','誰にも言えなかった頃の曲','2026年でもここにいる','ラスサビで毎回崩れる','もっと伸びて欲しい','高校の帰り道だった','再生数が少ないの信じられない','深夜3時に刺さる','コメント欄込みで作品','あの冬を思い出す','まだ見つかってない名曲','ミクリンクから来ました！','この曲だけは消えないで欲しい','夜にしか合わない気がする','今聴いても泣ける','ひとりの部屋にちょうどいい','ずっとここにいてくれ','聴くたびに景色が変わる','誰かの人生が詰まってる','ミクにしか歌えない曲がある','この世界観は替えが効かない','初めて聴いた日に戻りたい'];
  const layer=document.getElementById('comments-layer');
  function rnd(a,b){return a+Math.random()*(b-a)}
  for(let i=0;i<44;i++){
    const el=document.createElement('div');el.className='comment';
    el.textContent=floatingComments[Math.floor(Math.random()*floatingComments.length)];
    el.style.top=`${Math.random()*100}%`;el.style.fontSize=`${rnd(12,20)}px`;
    el.style.opacity=rnd(0.18,0.55);el.style.animationDuration=`${rnd(22,42)}s`;el.style.animationDelay=`${rnd(-38,0)}s`;
    layer.appendChild(el);
  }

  startIntro();
